name: Neon Weekly Audit


on:

  workflow_dispatch:


  schedule:

    - cron: "0 0 * * 0"



permissions:

  contents: read

  actions: read



# ============================================================
# PREVENT DATABASE JOB COLLISIONS
# Shared with neon-sync.yml
# ============================================================

concurrency:

  group: neon-database-operations

  cancel-in-progress: false





jobs:


  neon-audit:



    runs-on: ubuntu-latest


    timeout-minutes: 30





    steps:



      # ======================================================
      # CHECKOUT PUBLIC RUNNER
      # ======================================================

      - name: Checkout runner repository

        uses: actions/checkout@v4






      # ======================================================
      # RUNNER DEBUG INFORMATION
      # ======================================================

      - name: Show runner information


        run: |


          echo "=============================="

          echo "🚀 Neon Audit Runner"

          echo "=============================="


          echo ""

          echo "Date:"

          date -u



          echo ""

          echo "Python version:"

          python --version



          echo ""

          echo "Working directory:"

          pwd







      # ======================================================
      # CHECK PRIVATE TOKEN
      # ======================================================

      - name: Check private repository token


        run: |


          set -e


          echo "Checking private repo token..."


          if [ -z "${{ secrets.PRIVATE_REPO_TOKEN }}" ]

          then


            echo "❌ PRIVATE_REPO_TOKEN missing"


            exit 1


          fi



          echo "✅ PRIVATE_REPO_TOKEN exists"







      # ======================================================
      # CLONE PRIVATE REPOSITORY
      # ======================================================

      - name: Clone private crypto logger


        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}



        run: |


          set -e



          echo "📦 Downloading private repository..."



          for attempt in 1 2 3

          do


            echo "Clone attempt $attempt"



            if git clone \
            "https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git" \
            private_logger


            then


              echo "✅ Private repository downloaded"

              break


            fi



            echo "⚠ Clone failed"



            rm -rf private_logger



            sleep 10




            if [ "$attempt" -eq 3 ]

            then


              echo "❌ Clone failed after 3 attempts"


              exit 1


            fi


          done





          cd private_logger



          echo ""

          echo "Current branch:"


          git branch



          echo ""

          echo "Latest commit:"


          git log -1 --oneline







      # ======================================================
      # SHOW PRIVATE STRUCTURE
      # ======================================================

      - name: Show private repository structure


        run: |


          echo "=============================="

          echo "Private repository files"

          echo "=============================="



          find private_logger -maxdepth 3 -type f | sort







      # ======================================================
      # CHECK CSV
      # ======================================================

      - name: Validate CSV file


        run: |


          set -e



          CSV="private_logger/price_log.csv"



          if [ ! -f "$CSV" ]

          then


            echo "❌ CSV missing"


            exit 1


          fi



          echo "✅ CSV exists"



          echo ""

          echo "CSV size:"

          ls -lh "$CSV"



          echo ""

          echo "CSV rows:"

          wc -l "$CSV"



          echo ""

          echo "CSV header:"

          head -n 1 "$CSV"



          echo ""

          echo "Latest CSV rows:"

          tail -10 "$CSV"
                # ======================================================
      # PYTHON SETUP
      # ======================================================

      - name: Setup Python


        uses: actions/setup-python@v5


        with:


          python-version: "3.13"







      # ======================================================
      # INSTALL DEPENDENCIES
      # ======================================================

      - name: Install dependencies


        run: |


          set -e



          cd private_logger



          python -m pip install --upgrade pip



          if [ -f "Crypto Logger-Private Repo/requirements.txt" ]

          then


            pip install -r "Crypto Logger-Private Repo/requirements.txt"



          else


            pip install psycopg2-binary



          fi



          echo ""

          echo "Installed packages:"

          pip list







      # ======================================================
      # CHECK NEON SECRET
      # ======================================================

      - name: Check Neon configuration


        env:

          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |


          set -e



          if [ -z "$NEON_DATABASE_URL" ]

          then


            echo "❌ NEON_DATABASE_URL missing"


            exit 1



          fi



          echo "✅ Neon secret available"







      # ======================================================
      # TEST NEON CONNECTION
      # ======================================================

      - name: Test Neon database connection


        env:

          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |


          python - <<EOF


          import os

          import psycopg2



          conn = psycopg2.connect(

              os.getenv(
                  "NEON_DATABASE_URL"
              )

          )



          cur = conn.cursor()



          cur.execute(

              "SELECT NOW();"

          )



          print(

              "Neon database time:",

              cur.fetchone()[0]

          )



          cur.close()

          conn.close()



          print(

              "✅ Neon connection successful"

          )



          EOF







      # ======================================================
      # PYTHON SYNTAX CHECK
      # ======================================================

      - name: Validate audit syntax


        run: |


          set -e



          cd private_logger



          echo "🐍 Checking audit Python syntax..."



          python -m py_compile \

          "Neon Weekly Audit/neon_audit.py"



          echo "✅ Audit syntax OK"







      # ======================================================
      # RUN AUDIT
      # ======================================================

      - name: Run Neon audit


        env:


          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |


          set -e



          cd private_logger



          echo "=============================="

          echo "🚀 STARTING NEON WEEKLY AUDIT"

          echo "UTC Time: $(date -u)"

          echo "=============================="



          python "Neon Weekly Audit/neon_audit.py"



          echo ""

          echo "=============================="

          echo "✅ NEON AUDIT COMPLETED"

          echo "UTC Time: $(date -u)"

          echo "=============================="







      # ======================================================
      # FAILURE DEBUG ARTIFACT
      # ======================================================

      - name: Upload debug files if failed


        if: failure()



        uses: actions/upload-artifact@v4



        with:


          name: neon-audit-debug



          path:


            private_logger/



          retention-days: 7







      # ======================================================
      # CLEANUP
      # ======================================================

      - name: Cleanup runner


        if: always()



        run: |


          rm -rf private_logger



          echo "🧹 Runner cleaned"
