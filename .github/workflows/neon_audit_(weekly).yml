name: Neon Weekly Audit


on:

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * 0"



permissions:

  contents: read



# Prevent overlapping audits
concurrency:

  group: neon-weekly-audit

  cancel-in-progress: false



jobs:


  neon-audit:


    runs-on: ubuntu-latest

    timeout-minutes: 30



    steps:


      # =========================
      # CHECKOUT PUBLIC REPO
      # =========================

      - name: Checkout runner repository

        uses: actions/checkout@v4



      # =========================
      # DEBUG RUN INFO
      # =========================

      - name: Show runner information

        run: |

          echo "=============================="

          echo "Runner information"

          echo "=============================="

          echo "Date:"

          date


          echo ""

          echo "Python version:"

          python --version


          echo ""

          echo "Working directory:"

          pwd



      # =========================
      # CLONE PRIVATE REPO
      # =========================


      - name: Clone private crypto logger


        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}


        run: |


          set -e


          echo "Downloading private repository..."


          git clone \
          https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git \
          private_logger


          echo "✅ Private repository downloaded"



      # =========================
      # DEBUG PRIVATE STRUCTURE
      # =========================


      - name: Show private repository structure


        run: |


          echo "=============================="

          echo "Private repo files"

          echo "=============================="


          find private_logger -maxdepth 3 -type f | sort



      # =========================
      # CHECK CSV
      # =========================


      - name: Validate CSV file


        run: |


          set -e


          CSV="private_logger/price_log.csv"


          if [ ! -f "$CSV" ]

          then

            echo "❌ CSV missing"

            exit 1

          fi



          echo "✅ CSV exists"


          echo ""

          echo "CSV size:"

          ls -lh "$CSV"


          echo ""

          echo "CSV rows:"

          wc -l "$CSV"



          echo ""

          echo "CSV header:"

          head -n 1 "$CSV"



          echo ""

          echo "Latest CSV rows:"

          tail -n 10 "$CSV"



      # =========================
      # PYTHON
      # =========================


      - name: Setup Python


        uses: actions/setup-python@v5


        with:

          python-version: "3.13"



      - name: Install dependencies


        run: |


          set -e


          cd private_logger



          python -m pip install --upgrade pip



          if [ -f "Crypto Logger-Private Repo/requirements.txt" ]

          then

            pip install -r "Crypto Logger-Private Repo/requirements.txt"


          else


            pip install psycopg2-binary


          fi



          echo ""

          echo "Installed packages:"

          pip list



      # =========================
      # NEON SECRET CHECK
      # =========================


      - name: Check Neon configuration


        env:

          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}


        run: |


          if [ -z "$NEON_DATABASE_URL" ]

          then

            echo "❌ NEON_DATABASE_URL missing"

            exit 1

          fi



          echo "✅ Neon secret available"



      # =========================
      # RUN AUDIT
      # =========================


      - name: Run Neon audit


        env:

          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}


        run: |


          set -e


          cd private_logger



          echo "=============================="

          echo "Starting Neon Audit"

          echo "=============================="



          python "Neon Weekly Audit/neon_audit.py"



          echo ""

          echo "✅ Neon audit completed successfully"




      # =========================
      # FAILURE DEBUG ARTIFACT
      # =========================


      - name: Upload debug files if failed


        if: failure()


        uses: actions/upload-artifact@v4


        with:


          name: neon-audit-debug


          path:

            private_logger/


          retention-days: 7




      # =========================
      # CLEANUP
      # =========================


      - name: Cleanup runner


        if: always()


        run: |


          rm -rf private_logger


          echo "✅ Runner cleaned"
