name: Crypto Price Logger

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-logger:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

      # =========================
      # CHECKOUT PUBLIC RUNNER
      # =========================

      - name: Checkout runner
        uses: actions/checkout@v4


      # =========================
      # DOWNLOAD PRIVATE LOGGER
      # =========================

      - name: Clone private crypto logger
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

        run: |
          set -e

          echo "Downloading private repo..."

          git clone \
            --branch feature/network-manager-phase1 \
            --single-branch \
            "https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git" \
             private_logger

          echo "Private repo ready"

          ls -la private_logger


      # =========================
      # PYTHON
      # =========================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"


      - name: Install dependencies
        run: |
          set -e

          cd private_logger/"Crypto Logger-Private Repo"

          echo "Installing dependencies..."

          python -m pip install --upgrade pip

          pip install -r requirements.txt


      # =========================
      # SECRET CHECK
      # =========================

      - name: Check required secrets exist
        run: |

          echo "Checking secrets..."

          test -n "${{ secrets.NEON_DATABASE_URL }}" \
          && echo "✅ NEON_DATABASE_URL exists" \
          || exit 1


          test -n "${{ secrets.BINANCE_API_KEY }}" \
          && echo "✅ BINANCE_API_KEY exists" \
          || exit 1


          test -n "${{ secrets.BINANCE_SECRET_KEY }}" \
          && echo "✅ BINANCE_SECRET_KEY exists" \
          || exit 1


          test -n "${{ secrets.VPNBOOK_CONFIG }}" \
          && echo "✅ VPNBOOK_CONFIG exists" \
          || exit 1


      # =========================
      # VPN
      # =========================

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn


      - name: Create VPN config
        run: |

          echo "${{ secrets.VPNBOOK_CONFIG }}" > vpnbook.ovpn


          printf "%s\n%s\n" \
          "${{ secrets.VPNBOOK_USERNAME }}" \
          "${{ secrets.VPNBOOK_PASSWORD }}" > auth.txt


          echo "auth-user-pass auth.txt" >> vpnbook.ovpn


      - name: Connect VPN
        run: |

          sudo openvpn \
          --config vpnbook.ovpn \
          --daemon \
          --log vpn.log


          echo "Waiting for VPN..."

          sleep 30


      - name: Check VPN
        run: |

          ps aux | grep openvpn || true

          echo "--- VPN LOG ---"

          cat vpn.log || true


      - name: Verify VPN location
        run: |

          echo "IP:"

          curl -s https://api.ipify.org

          echo


          echo "Country:"

          curl -s https://ipinfo.io/country


      # =========================
      # NETWORK TESTS
      # =========================

      - name: Test CoinGecko
        run: |

          curl -i https://api.coingecko.com/api/v3/ping


      - name: Test Binance
        run: |

          curl -i https://api.binance.com/api/v3/time || true


      # =========================
      # RUN LOGGER
      # =========================

      - name: Run logger

        env:

          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}

          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}

        run: |

          set -e


          cd private_logger/"Crypto Logger-Private Repo"


          echo "Starting logger..."


          python price_logger.py


          echo "✅ Logger completed"


      # =========================
      # VERIFY CSV
      # =========================

      - name: Check generated CSV
        run: |

          set -e


          if [ ! -f private_logger/price_log.csv ]

          then

            echo "❌ CSV missing"

            exit 1

          fi


          echo "✅ CSV exists"


          wc -l private_logger/price_log.csv


      # =========================
      # SAVE CSV BACK
      # =========================

      - name: Save CSV to private repo

        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

        run: |

          set -e


          cd private_logger


          git config user.name "github-actions"

          git config user.email "actions@github.com"


          git add "price_log.csv"


          if git diff --cached --quiet

          then

            echo "No CSV changes"

            exit 0

          fi


          git commit -m "Update crypto price log $(date -u)"


          git push \
          "https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git" \
          HEAD:main


          echo "✅ CSV pushed"


      # =========================
      # CLEAN
      # =========================

      - name: Cleanup

        if: always()

        run: |

          rm -rf private_logger

          rm -f vpnbook.ovpn auth.txt vpn.log


          echo "Cleaned runner"
