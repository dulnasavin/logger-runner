name: Crypto Price Logger


on:

  workflow_dispatch:


permissions:

  contents: read



# ============================================================
# PREVENT MULTIPLE LOGGER RUNS
# ============================================================

concurrency:

  group: crypto-price-logger

  cancel-in-progress: false



jobs:


  run-logger:


    runs-on: ubuntu-latest

    timeout-minutes: 15



    steps:


      # =========================
      # CHECKOUT PUBLIC RUNNER
      # =========================


      - name: Checkout runner

        uses: actions/checkout@v4






      # =========================
      # DOWNLOAD PRIVATE LOGGER
      # =========================


      - name: Clone private crypto logger


        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}


        run: |


          set -e


          echo "Downloading private repo..."



          if [ -z "$TOKEN" ]

          then

            echo "❌ PRIVATE_REPO_TOKEN missing"

            exit 1

          fi



          echo "✅ PRIVATE_REPO_TOKEN exists"



          git clone \
          "https://x-access-token:${TOKEN}@GitHub.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git" \
          private_logger



          echo "Private repo ready"



          cd private_logger



          echo "Current branch:"

          git branch



          echo "Latest commit:"

          git log -1 --oneline







      # =========================
      # PYTHON
      # =========================


      - name: Setup Python


        uses: actions/setup-python@v5


        with:

          python-version: "3.13"







      - name: Install dependencies


        run: |


          set -e



          cd private_logger/"Crypto Logger-Private Repo"



          echo "Installing dependencies..."



          python -m pip install --upgrade pip



          pip install -r requirements.txt








      # =========================
      # SECRET CHECK
      # =========================


      - name: Check required secrets exist


        run: |


          echo "Checking secrets..."



          test -n "${{ secrets.NEON_DATABASE_URL }}" \
          && echo "✅ NEON_DATABASE_URL exists" \
          || exit 1




          test -n "${{ secrets.BINANCE_API_KEY }}" \
          && echo "✅ BINANCE_API_KEY exists" \
          || exit 1




          test -n "${{ secrets.BINANCE_SECRET_KEY }}" \
          && echo "✅ BINANCE_SECRET_KEY exists" \
          || exit 1




          test -n "${{ secrets.VPNBOOK_CONFIG }}" \
          && echo "✅ VPNBOOK_CONFIG exists" \
          || exit 1







      # =========================
      # VPN
      # =========================


      - name: Install OpenVPN


        run: |


          sudo apt-get update


          sudo apt-get install -y openvpn







      - name: Create VPN config


        run: |


          echo "${{ secrets.VPNBOOK_CONFIG }}" > vpnbook.ovpn



          printf "%s\n%s\n" \
          "${{ secrets.VPNBOOK_USERNAME }}" \
          "${{ secrets.VPNBOOK_PASSWORD }}" > auth.txt



          echo "auth-user-pass auth.txt" >> vpnbook.ovpn








      - name: Connect VPN


        run: |


          sudo openvpn \
          --config vpnbook.ovpn \
          --daemon \
          --log vpn.log




          echo "Waiting VPN..."



          sleep 30








      - name: Verify VPN


        run: |


          echo "VPN process:"



          ps aux | grep openvpn || true




          echo ""



          echo "IP:"



          curl -s https://api.ipify.org




          echo ""



          echo "Country:"



          curl -s https://ipinfo.io/country



          echo







      # =========================
      # NETWORK TESTS
      # =========================


      - name: Test CoinGecko


        run: |


          curl -i https://api.coingecko.com/api/v3/ping






      - name: Test Binance


        run: |


          curl -i https://api.binance.com/api/v3/time || true







      # =========================
      # RUN LOGGER
      # =========================


      - name: Run logger


        env:


          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}


          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}


          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}



        run: |


          set -e



          cd private_logger/"Crypto Logger-Private Repo"




          echo "Starting logger..."




          python price_logger.py




          echo "✅ Logger completed"
                # =========================
      # VERIFY CSV
      # =========================


      - name: Check generated CSV


        run: |


          set -e



          CSV="private_logger/price_log.csv"



          if [ ! -f "$CSV" ]

          then

            echo "❌ CSV missing"

            exit 1

          fi




          echo "✅ CSV exists"




          echo ""

          echo "CSV size:"

          ls -lh "$CSV"




          echo ""

          echo "CSV rows:"

          wc -l "$CSV"




          echo ""

          echo "Latest rows:"

          tail -n 10 "$CSV"








      # =========================
      # SAVE CSV BACK
      # =========================


      - name: Save CSV to private repo


        env:


          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}



        run: |


          set -e




          cd private_logger




          git config user.name "github-actions"

          git config user.email "actions@github.com"




          echo "Checking repository state..."



          git status




          # ---------------------------------
          # Remove any unwanted local changes
          # ---------------------------------

          echo "Cleaning working tree..."



          git reset --hard HEAD



          git clean -fd




          # ---------------------------------
          # Get latest remote safely
          # ---------------------------------


          echo "Fetching latest remote..."



          git fetch origin main




          echo "Resetting to latest remote..."



          git reset --hard origin/main




          # ---------------------------------
          # Restore generated CSV
          # ---------------------------------


          echo "Checking CSV after remote update..."



          if [ ! -f price_log.csv ]

          then

            echo "❌ price_log.csv disappeared after reset"

            exit 1

          fi




          git add price_log.csv




          if git diff --cached --quiet

          then


            echo "No CSV changes"



            exit 0


          fi




          echo "CSV changes detected:"



          git diff --cached --stat






          git commit \
          -m "Update crypto price log $(date -u)"






          # ---------------------------------
          # Push with retry protection
          # ---------------------------------


          echo "Pushing changes..."



          for attempt in 1 2 3

          do


            echo "Push attempt $attempt"



            if git push \
            "https://x-access-token:${TOKEN}@GitHub.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git" \
            HEAD:main

            then


              echo "✅ CSV pushed successfully"

              break


            fi




            echo "⚠ Push failed. Another update may have arrived."



            if [ "$attempt" -lt 3 ]

            then


              echo "Refreshing remote..."



              git fetch origin main



              git reset --hard origin/main



              git add price_log.csv



              git commit \
              -m "Update crypto price log retry $(date -u)" \
              || true



              sleep 5



            else


              echo "❌ Push failed after 3 attempts"



              exit 1


            fi


          done







      # =========================
      # CLEAN
      # =========================


      - name: Cleanup


        if: always()


        run: |



          rm -rf private_logger



          rm -f vpnbook.ovpn auth.txt vpn.log




          echo "🧹 Runner cleaned"
