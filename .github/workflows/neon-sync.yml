name: Neon Database Sync


on:

  workflow_run:

    workflows:

      - "Crypto Price Logger"

    types:

      - completed


  workflow_dispatch:



permissions:

  contents: read

  actions: read



# ============================================================
# PREVENT DATABASE JOB COLLISIONS
# ============================================================

concurrency:

  group: neon-database-operations

  cancel-in-progress: false






jobs:


  sync-to-neon:


    if: >

      github.event.workflow_run.conclusion == 'success'

      ||

      github.event_name == 'workflow_dispatch'



    runs-on: ubuntu-latest


    timeout-minutes: 5






    steps:




      # ======================================================
      # CHECKOUT PUBLIC RUNNER
      # ======================================================

      - name: Checkout runner

        uses: actions/checkout@v4







      # ======================================================
      # CHECK PRIVATE TOKEN
      # ======================================================

      - name: Check private repo token


        run: |


          set -e


          echo "🔐 Checking private repo token..."


          if [ -z "${{ secrets.PRIVATE_REPO_TOKEN }}" ]

          then

            echo "❌ PRIVATE_REPO_TOKEN missing"

            exit 1

          fi


          echo "✅ PRIVATE_REPO_TOKEN available"







      # ======================================================
      # CLONE PRIVATE LOGGER REPO
      # ======================================================

      - name: Clone private crypto logger


        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}


        run: |


          set -e


          echo "📦 Downloading private repository..."


          git clone "https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git" private_logger


          echo "✅ Private repository downloaded"


          echo ""

          echo "Repository contents:"

          ls -la private_logger







      # ======================================================
      # CHECK REQUIRED FILES
      # ======================================================

      - name: Verify required files


        run: |


          set -e


          echo "🔎 Checking required files..."



          if [ -f "private_logger/Neon Sync/sync_to_neon.py" ]

          then

            echo "✅ sync_to_neon.py found"

          else

            echo "❌ sync_to_neon.py missing"

            exit 1

          fi




          if [ -f "private_logger/price_log.csv" ]

          then

            echo "✅ price_log.csv found"

          else

            echo "❌ price_log.csv missing"

            exit 1

          fi
                # ======================================================
      # SHOW CSV INFORMATION
      # ======================================================

      - name: Check CSV information


        run: |


          set -e


          echo "📊 CSV information"


          echo ""

          wc -l private_logger/price_log.csv



          echo ""

          echo "CSV header:"


          head -n 1 private_logger/price_log.csv



          echo ""

          echo "Latest CSV rows:"


          tail -5 private_logger/price_log.csv







      # ======================================================
      # PYTHON SETUP
      # ======================================================

      - name: Setup Python


        uses: actions/setup-python@v5


        with:


          python-version: "3.13"








      # ======================================================
      # INSTALL DEPENDENCIES
      # ======================================================

      - name: Install dependencies


        run: |


          set -e


          cd private_logger



          python -m pip install --upgrade pip



          if [ -f "Crypto Logger-Private Repo/requirements.txt" ]

          then

            echo "Installing requirements.txt"


            pip install -r "Crypto Logger-Private Repo/requirements.txt"


          else


            echo "requirements.txt not found"


            echo "Installing psycopg2 manually"


            pip install psycopg2-binary


          fi



          echo ""

          echo "Installed packages:"


          pip list







      # ======================================================
      # PYTHON SYNTAX CHECK
      # ======================================================

      - name: Validate sync syntax


        run: |


          set -e


          cd private_logger



          echo "🐍 Checking Python syntax..."



          python -m py_compile "Neon Sync/sync_to_neon.py"



          echo "✅ Syntax OK"







      # ======================================================
      # CHECK NEON SECRET
      # ======================================================

      - name: Check Neon secret


        run: |


          set -e



          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]

          then


            echo "❌ NEON_DATABASE_URL missing"


            exit 1


          fi



          echo "✅ Neon secret exists"








      # ======================================================
      # TEST NEON CONNECTION
      # ======================================================

      - name: Test Neon database connection


        env:


          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |


          python - <<EOF


          import os

          import psycopg2



          url = os.getenv(
              "NEON_DATABASE_URL"
          )



          conn = psycopg2.connect(url)


          cur = conn.cursor()



          cur.execute(
              "SELECT NOW();"
          )



          print(
              "Neon database time:",
              cur.fetchone()[0]
          )



          cur.close()

          conn.close()



          print(
              "✅ Neon connection OK"
          )


          EOF







      # ======================================================
      # RUN SYNC
      # ======================================================

      - name: Run Neon sync


        env:


          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |


          set -e



          cd private_logger



          echo "=============================="

          echo "🚀 STARTING NEON SYNC"

          echo "UTC Time: $(date -u)"

          echo "=============================="



          python "Neon Sync/sync_to_neon.py"



          echo ""

          echo "=============================="

          echo "✅ NEON SYNC COMPLETED"

          echo "UTC Time: $(date -u)"

          echo "=============================="








      # ======================================================
      # CLEAN RUNNER
      # ======================================================

      - name: Cleanup


        if: always()



        run: |


          rm -rf private_logger


          echo "🧹 Runner cleaned"
