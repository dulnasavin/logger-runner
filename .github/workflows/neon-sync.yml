name: Neon Database Sync


on:

  workflow_run:

    workflows:

      - "Crypto Price Logger"

    types:

      - completed


  workflow_dispatch:



permissions:

  contents: read

  actions: read



# ============================================================
# PREVENT DATABASE JOB COLLISIONS
# Sync and Audit share this group
# ============================================================

concurrency:

  group: neon-database-operations

  cancel-in-progress: false




jobs:


  sync-to-neon:



    if: >

      github.event.workflow_run.conclusion == 'success'

      ||

      github.event_name == 'workflow_dispatch'



    runs-on: ubuntu-latest



    timeout-minutes: 5





    steps:



      # ======================================================
      # CHECKOUT PUBLIC RUNNER
      # ======================================================

      - name: Checkout runner

        uses: actions/checkout@v4






      # ======================================================
      # CLONE PRIVATE LOGGER REPO
      # ======================================================

      - name: Clone private crypto logger


        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}



        run: |


          set -e


          echo "📦 Downloading private repo..."



          git clone \

          https://x-access-token:${TOKEN}@GitHub.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git \

          private_logger



          echo "✅ Private repo downloaded"







      # ======================================================
      # CHECK REQUIRED FILES
      # ======================================================

      - name: Verify required files


        run: |


          set -e



          echo "🔎 Checking files..."



          test -f "private_logger/Neon Sync/sync_to_neon.py" \

          && echo "✅ sync_to_neon.py found" \

          || exit 1




          test -f "private_logger/price_log.csv" \

          && echo "✅ price_log.csv found" \

          || exit 1







      # ======================================================
      # SHOW CSV INFORMATION
      # ======================================================

      - name: Check CSV information


        run: |


          set -e



          echo "📊 CSV information"


          wc -l private_logger/price_log.csv



          echo "Latest CSV rows:"


          tail -5 private_logger/price_log.csv







      # ======================================================
      # PYTHON SETUP
      # ======================================================

      - name: Setup Python


        uses:

          actions/setup-python@v5


        with:


          python-version: "3.13"







      # ======================================================
      # INSTALL DEPENDENCIES
      # ======================================================

      - name: Install dependencies


        run: |


          set -e



          cd private_logger/"Crypto Logger-Private Repo"



          python -m pip install --upgrade pip



          pip install -r requirements.txt







      # ======================================================
      # PYTHON SYNTAX CHECK
      # ======================================================

      - name: Validate sync syntax


        run: |


          set -e



          cd private_logger



          echo "🐍 Checking Python syntax..."



          python -m py_compile \

          "Neon Sync/sync_to_neon.py"



          echo "✅ Syntax OK"







      # ======================================================
      # CHECK NEON SECRET
      # ======================================================

      - name: Check Neon secret


        run: |



          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]

          then


            echo "❌ NEON_DATABASE_URL missing"


            exit 1


          fi



          echo "✅ Neon secret exists"







      # ======================================================
      # TEST NEON CONNECTION
      # ======================================================

      - name: Test Neon database connection


        env:


          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |


          python - <<EOF


          import os

          import psycopg2



          url = os.getenv(
              "NEON_DATABASE_URL"
          )



          conn = psycopg2.connect(url)


          cur = conn.cursor()



          cur.execute(
              "SELECT NOW();"
          )



          print(
              "Neon database time:",
              cur.fetchone()[0]
          )



          cur.close()

          conn.close()



          print(
              "✅ Neon connection OK"
          )


          EOF







      # ======================================================
      # RUN SYNC
      # ======================================================

      - name: Run Neon sync



        env:


          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}



        run: |



          set -e



          cd private_logger



          echo "=============================="

          echo "🚀 STARTING NEON SYNC"

          echo "UTC Time: $(date -u)"

          echo "=============================="



          python "Neon Sync/sync_to_neon.py"



          echo "=============================="

          echo "✅ NEON SYNC COMPLETED"

          echo "UTC Time: $(date -u)"

          echo "=============================="







      # ======================================================
      # CLEAN RUNNER
      # ======================================================

      - name: Cleanup


        if: always()



        run: |



          rm -rf private_logger



          echo "🧹 Runner cleaned"
