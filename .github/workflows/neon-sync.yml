name: Neon Database Sync


on:

  workflow_run:
    workflows:
      - "Crypto Price Logger"

    types:
      - completed


  workflow_dispatch:


permissions:

  contents: read



jobs:

  sync-to-neon:


    if: >
      github.event.workflow_run.conclusion == 'success'
      || github.event_name == 'workflow_dispatch'


    runs-on: ubuntu-latest



    steps:


      # =========================
      # CHECKOUT PUBLIC RUNNER
      # =========================

      - name: Checkout runner

        uses: actions/checkout@v4



      # =========================
      # DOWNLOAD PRIVATE REPO
      # =========================

      - name: Clone private crypto logger

        env:

          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}


        run: |


          echo "Downloading private repo..."


          git clone \
          https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git \
          private_logger


          echo "Private repo downloaded"



      - name: Check private files

        run: |

          ls -lah private_logger



      # =========================
      # PYTHON
      # =========================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.13"



      - name: Install dependencies

        run: |


          cd private_logger


          python -m pip install --upgrade pip


          pip install -r requirements.txt




      # =========================
      # CHECK CSV
      # =========================

      - name: Verify CSV exists

        run: |


          if [ ! -f private_logger/price_log.csv ]

          then

            echo "❌ CSV missing"

            exit 1

          fi



          echo "CSV found"


          wc -l private_logger/price_log.csv




      # =========================
      # SECRET CHECK
      # =========================

      - name: Check Neon secret

        run: |


          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]

          then

            echo "❌ Neon URL missing"

            exit 1

          fi


          echo "✅ Neon secret exists"




      # =========================
      # RUN SYNC
      # =========================

      - name: Run Neon Sync

        env:

          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}


        run: |


          cd private_logger


          echo "🚀 Starting CSV → Neon sync"


          python sync_to_neon.py



          echo "✅ Neon sync completed"




      # =========================
      # CLEAN
      # =========================

      - name: Cleanup

        if: always()

        run: |


          rm -rf private_logger


          echo "Runner cleaned"
