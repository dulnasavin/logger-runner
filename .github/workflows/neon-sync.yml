name: Neon Database Sync

on:
  workflow_run:
    workflows:
      - "Crypto Price Logger"
    types:
      - completed

  workflow_dispatch:


permissions:
  contents: read


jobs:

  sync-to-neon:

    timeout-minutes: 10

    if: >
      github.event.workflow_run.conclusion == 'success'
      ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest


    steps:

      - name: Checkout runner
        uses: actions/checkout@v4


      - name: Clone private crypto logger
        env:
          TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

        run: |

          set -e

          git clone \
          https://x-access-token:${TOKEN}@github.com/dulnasavin/Repository-name-crypto-tracker-Private-Yes.git \
          private_logger


          echo "Private repo ready"


      - name: Check CSV

        run: |

          if [ ! -f private_logger/price_log.csv ]

          then
            echo "❌ price_log.csv missing"
            exit 1
          fi


          echo "✅ CSV found"

          wc -l private_logger/price_log.csv



      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.13"



      - name: Install dependencies

        run: |

          set -e

          cd private_logger/"Crypto Logger-Private Repo"

          python -m pip install --upgrade pip

          pip install -r requirements.txt



      - name: Check Neon secret

        run: |

          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]

          then
            echo "❌ Neon secret missing"
            exit 1
          fi


          echo "✅ Neon secret exists"
          - name: Debug paths
            run: |
                cd private_logger
                echo "Current folder:"
                pwd

                echo "Files:"
                find . -maxdepth 2 -type f | sort
   
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

          run: |

          set -e

          cd private_logger/"Neon Sync"

          echo "🚀 Starting Neon sync"


          python sync_to_neon.py


          echo "✅ Neon sync completed"



      - name: Cleanup

        if: always()

        run: |

          rm -rf private_logger

          echo "Runner cleaned"
